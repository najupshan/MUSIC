<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>My Composed Songs</title>
<style>
body {
    font-family: Arial, sans-serif;
    background: #000;
    color: #fff;
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: 30px;
    margin: 0;
}
h2 {
    text-align: center;
    margin-bottom: 30px;
    color: #ffffff;
}
.song-container {
    display: flex;
    flex-direction: column;
    gap: 20px;
    width: 100%;
    max-width: 600px;
}
.song {
    background: #fff;
    padding: 20px;
    border-radius: 12px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    position: relative;
    transition: transform 0.3s;
}
.song:hover {
    transform: scale(1.02);
}
.song-left {
    position: relative;
    flex: 1;
    margin-right: 20px;
    cursor: pointer;
}
.song-left img {
    width: 100%;
    border-radius: 8px;
    display: block;
}
.overlay {
    position: absolute;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    background: rgba(0,0,0,0.5);
    color: #fff;
    font-size: 18px;
    display: flex;
    justify-content: center;
    align-items: center;
    opacity: 0;
    border-radius: 12px;
    transition: opacity 0.3s;
}
.song-left:hover .overlay {
    opacity: 1;
}
.song-name {
    font-weight: bold;
    margin-bottom: 10px;
    text-align: center;
}
.qr-code {
    width: 100px;
    height: 100px;
    border-radius: 8px;
    cursor: pointer;
}
.beats {
    position: absolute;
    bottom: 10px;
    left: 50%;
    transform: translateX(-50%);
    display: flex;
    gap: 4px;
}

.beat {
    width: 6px;
    height: 10px;
    background: #00ffcc;
    animation: bounce 1s infinite ease-in-out;
}

.beat:nth-child(2) { animation-delay: 0.1s; }
.beat:nth-child(3) { animation-delay: 0.2s; }
.beat:nth-child(4) { animation-delay: 0.3s; }

@keyframes bounce {
    0%, 100% { height: 8px; }
    50% { height: 25px; }
}    
</style>
</head>
<body>

<h2>🎵 Songs 🎵</h2>

<div class="song-container">

  <!-- Song 1 -->
  <div class="song">
    <div class="song-left" onclick="downloadSong('https://drive.google.com/uc?export=download&id=1mXo30T5K_l9wZw7NPvXw68paeZmpnfZ0')">
        <div class="song-name">Bad Habits</div>
        <img src="images/Bad%20Habits%20Cover%20(1).jpg" alt="Bad Habits Cover">
        <div class="beats">
    <div class="beat"></div>
    <div class="beat"></div>
    <div class="beat"></div>
    <div class="beat"></div>
</div>

        <div class="overlay">⬇ Download</div>
    </div>
    <a href="https://drive.google.com/uc?export=download&id=1mXo30T5K_l9wZw7NPvXw68paeZmpnfZ0" download>
        <img class="qr-code" src="qr_codes/Bad_Habits_QR.png" alt="QR Code for Bad Habits">
    </a>
  </div>

  <!-- Add more songs below by duplicating the above block -->

</div>

<script>
function downloadSong(filePath) {
    const link = document.createElement('a');
    link.href = filePath;
    link.download = '';
    document.body.appendChild(link);
    link.click();
    document.body.removeChild(link);
}
</script>

</body>
</html>
